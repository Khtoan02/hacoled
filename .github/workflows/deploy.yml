name: Validate and deploy HacoLED theme

on:
  push:
    branches:
      - main # (Đổi thành 'master' nếu nhánh của bạn tên là master)

jobs:
  web-deploy:
    name: Validate and deploy via SFTP
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install frontend dependencies
      run: npm ci

    - name: Build frontend assets
      run: npm run build

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: Validate PHP syntax
      shell: bash
      run: find . -path './node_modules' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

    - name: Deploy theme to WordPress
      uses: wlixcc/SFTP-Deploy-Action@v1.2.6
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        
        # Ép buộc kết nối qua cổng 22 của SFTP
        port: 22 
        
        # Đường dẫn thư mục code hiện tại trên GitHub
        local_path: './' 
        
        # Must match the active theme directory/stylesheet slug.
        remote_path: '/public_html/wp-content/themes/hacoled/'
        
        # Danh sách loại trừ (Không đẩy thư mục node_modules, .git lên hosting)
        rsyncArgs: '--exclude=node_modules --exclude=.git --exclude=.github --exclude=README.md --exclude=ARCHITECTURE.md --exclude=.DS_Store'
